# =============================================================================
# Conda environment – Alpine PV Suitability Analysis, Graubünden
# =============================================================================
# Create with:  conda env create -f environment.yml
# Activate:     conda activate alpine_pv
# Update:       conda env update -f environment.yml --prune
# =============================================================================

name: alpine_pv

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  # ---- Core geospatial ----
  - rasterio>=1.3
  - numpy>=1.26
  - scipy>=1.12
  - geopandas>=0.14
  - shapely>=2.0
  - fiona>=1.9
  - pyproj>=3.6
  - gdal>=3.7
  # ---- Raster/vector helpers ----
  - xarray>=2023.1
  - netcdf4>=1.6          # NetCDF4 engine for xarray (primary)
  - h5netcdf>=1.2         # HDF5-based NetCDF engine (fallback)
  - h5py>=3.9             # HDF5 backend required by h5netcdf
  - pandas>=2.0
  - rasterstats>=0.19
  # ---- Visualization ----
  - matplotlib>=3.8
  - cartopy>=0.22
  # ---- ML / Validation ----
  - scikit-learn>=1.4
  # ---- Sensitivity Analysis ----
  - salib>=1.4
  # ---- OSM / Roads ----
  - osmnx>=1.7
  # ---- Config ----
  - pyyaml>=6.0
  - requests>=2.31
  # ---- Jupyter ----
  - jupyter>=1.0
  - jupyterlab>=4.0
  - ipykernel>=6.25
  - notebook>=7.0
  # ---- Testing ----
  - pytest>=7.4
  # ---- pip-only packages ----
  - pip
  - pip:
      - atlite>=0.2.12
      - pylusat>=0.5
      - pyahp>=0.1.2
