################################################################################
# CACHING-STRATEGIE
################################################################################

cache_strategy:
  directory: "data/processed/cache/"
  file_format: "pickle (.pkl)"
  ttl_days: 7
  max_age_check: true
  force_refresh_override: true
  
  parallel_loading: true  # Greift auf mehrere Caches gleichzeitig zu
  
  compression: false  # Pickle native compression nicht verwendet
  
  bundling_strategy:
    - key: "tlm_bodengewaesser"
      includes: ["tlm_gewaesser_fliessgewaesser", "tlm_gewaesser_stehendes_gewaesser"]
      reason: "Beide werden in C11 zusammen verwendet"
    
    - key: "tlm_strasse"
      includes: ["tlm_strasse only"]
      reason: "Wird für Distance Raster in mehreren Notebooks verwendet"

cache_naming_convention: "{key}.pkl"
  # Beispiele:
  # - tlm_bodenbedeckung.pkl
  # - tlm_strasse.pkl
  # - tlm_seilbahn.pkl
  # - dem_derivatives.pkl

